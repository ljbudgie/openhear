name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies
        # PyAudio / bleak / matplotlib / soundfile need native libraries
        # that aren't pre-installed on GitHub runners, so we install only
        # the core deps + pytest here.  The DSP and streaming paths that
        # rely on those native libs are exercised through stubs in
        # tests/conftest.py.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy hid PyYAML pytest

      - name: Run unit tests
        run: pytest -q
