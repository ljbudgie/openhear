name: Bug report
description: Report a defect in the OpenHear software, scripts, or documentation.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not** file
        security or hearing-safety issues here — use the private channels
        listed in [`SECURITY.md`](../../SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `openhear-pipeline ...`, the output ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the problem.
      placeholder: |
        1. `pip install -e .[dev]`
        2. Run `pytest tests/test_dsp_pipeline.py -k feedback`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: openhear-version
    attributes:
      label: OpenHear version / commit SHA
      placeholder: "0.1.0 or commit abc1234"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.7"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 23H2 / Ubuntu 24.04 / macOS 14.4"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / tracebacks
      description: Paste relevant logs. Please scrub any audiogram or personally identifying data.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is **not** a security or hearing-safety issue (those go through `SECURITY.md`).
          required: true
