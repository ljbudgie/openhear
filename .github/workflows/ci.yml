name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check .

  test:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          # The README states Windows 11 is the primary target — exercise the
          # newest supported Python there as well.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies
        # PyAudio / bleak / matplotlib / soundfile need native libraries
        # that aren't pre-installed on GitHub runners, so we install only
        # the core deps + pytest here.  The DSP and streaming paths that
        # rely on those native libs are exercised through stubs in
        # tests/conftest.py.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy hid PyYAML pytest pytest-cov

      - name: Run unit tests
        run: pytest -q --cov --cov-report=xml --cov-report=term

      - name: Upload coverage artefact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/openhear-venv
          /tmp/openhear-venv/bin/pip install --upgrade pip
          /tmp/openhear-venv/bin/pip install dist/*.whl
          /tmp/openhear-venv/bin/python -c "import dsp, core, audiogram, stream, voice, learn, wristband; print('import OK')"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
