name: Feature request
description: Suggest a new feature, module, or improvement to OpenHear.
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user need or scenario, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like OpenHear to do? Reference any relevant pillar from the README if it applies.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you rejected them.
  - type: dropdown
    id: area
    attributes:
      label: Area of the project
      multiple: true
      options:
        - DSP pipeline
        - Audiogram
        - Voice / own-voice
        - Streaming / Bluetooth
        - Wristband / haptic
        - Hardware (Tympan / shells / 3D-print)
        - Learning / personalisation
        - Documentation
        - Tooling / CI
        - Other
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this proposal is not a duplicate.
          required: true
